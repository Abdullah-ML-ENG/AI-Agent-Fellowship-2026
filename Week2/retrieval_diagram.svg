<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" width="100%" height="100%" style="background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#475569" />
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1" />
    </filter>
  </defs>

  <text x="30" y="40" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Advanced Ingestion &amp; Retrieval Mechanics</text>
  <text x="30" y="60" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="12" fill="#64748b">Details on Parent-Child Chunking and Cross-Encoder Re-ranking</text>

  <!-- Left Part: Parent-Child Chunking -->
  <g transform="translate(40, 90)">
    <text x="0" y="0" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#0f172a">A. Parent-Child Chunking</text>
    <text x="0" y="16" font-family="'Segoe UI', sans-serif" font-size="11" fill="#64748b">Decouples semantic indexing size from synthesis context size.</text>

    <rect x="0" y="40" width="300" height="70" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)" />
    <text x="150" y="65" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#1e40af" text-anchor="middle">Parent Document Chunk (Full Context)</text>
    <text x="150" y="85" font-family="'Segoe UI', sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">Size: 2000-4000 characters (Paragraphs / Section)</text>

    <rect x="0" y="170" width="80" height="40" rx="4" fill="#faf5ff" stroke="#7e22ce" stroke-width="1.5" filter="url(#shadow)" />
    <text x="40" y="195" font-family="'Segoe UI', sans-serif" font-size="10" font-weight="bold" fill="#6b21a8" text-anchor="middle">Child 1</text>
    
    <rect x="110" y="170" width="80" height="40" rx="4" fill="#faf5ff" stroke="#7e22ce" stroke-width="1.5" filter="url(#shadow)" />
    <text x="150" y="190" font-family="'Segoe UI', sans-serif" font-size="10" font-weight="bold" fill="#6b21a8" text-anchor="middle">Child 2</text>
    <text x="150" y="202" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a855f7" text-anchor="middle">[Matched]</text>
    
    <rect x="220" y="170" width="80" height="40" rx="4" fill="#faf5ff" stroke="#7e22ce" stroke-width="1.5" filter="url(#shadow)" />
    <text x="260" y="195" font-family="'Segoe UI', sans-serif" font-size="10" font-weight="bold" fill="#6b21a8" text-anchor="middle">Child 3</text>

    <path d="M 40 170 L 40 140 L 150 140 L 150 110" fill="none" stroke="#64748b" stroke-width="1.5" />
    <path d="M 150 170 L 150 110" fill="none" stroke="#64748b" stroke-width="1.5" />
    <path d="M 260 170 L 260 140 L 150 140 L 150 110" fill="none" stroke="#64748b" stroke-width="1.5" />
    
    <text x="150" y="240" font-family="'Segoe UI', sans-serif" font-size="10" font-weight="bold" fill="#7e22ce" text-anchor="middle">Indexed in Vector Database (100-200 char overlap)</text>
    <path d="M 150 160 L 150 130" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" />
    <text x="160" y="145" font-family="'Segoe UI', sans-serif" font-size="10" font-weight="bold" fill="#15803d">Retrieve Parent</text>
  </g>

  <line x1="430" y1="90" x2="430" y2="400" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4" />

  <!-- Right Part: Re-ranking Loop -->
  <g transform="translate(480, 90)">
    <text x="0" y="0" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#0f172a">B. Cross-Encoder Re-ranking</text>
    <text x="0" y="16" font-family="'Segoe UI', sans-serif" font-size="11" fill="#64748b">Re-calculates query-context relevance using deep attention.</text>

    <rect x="0" y="40" width="130" height="50" rx="4" fill="#f8fafc" stroke="#94a3b8" stroke-width="1" />
    <text x="65" y="65" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">Candidate Pool (K=50)</text>
    <text x="65" y="80" font-family="'Segoe UI', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">(Fast Bi-Encoder Search)</text>

    <line x1="130" y1="65" x2="180" y2="65" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

    <rect x="180" y="40" width="180" height="80" rx="6" fill="#f0fdfa" stroke="#0d9488" stroke-width="2" filter="url(#shadow)" />
    <text x="270" y="70" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#0f766e" text-anchor="middle">Cross-Encoder Model</text>
    <text x="270" y="85" font-family="'Segoe UI', sans-serif" font-size="10" fill="#0f766e" text-anchor="middle">(Attention over Query + Chunk)</text>
    <text x="270" y="100" font-family="'Segoe UI', sans-serif" font-size="9" fill="#56b3a0" text-anchor="middle">Runs heavy deep scoring</text>

    <path d="M 270 120 L 270 160" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

    <rect x="180" y="160" width="180" height="70" rx="4" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow)" />
    <text x="270" y="185" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#c2410c" text-anchor="middle">Re-ordered Candidates</text>
    <text x="270" y="200" font-family="'Segoe UI', sans-serif" font-size="10" fill="#c2410c" text-anchor="middle">Top K=3 to 5 (High Signal)</text>
    <text x="270" y="215" font-family="'Segoe UI', sans-serif" font-size="9" fill="#9a3412" text-anchor="middle">Injected to LLM Context Window</text>
  </g>
</svg>
